<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% feed_meta %}
  {% seo %}
</head>
<body>

  <div class="site-image">
    <img src="{{ '/assets/hero.png' | relative_url }}" alt="">
  </div>

  <div class="site-wrapper">
    <header>
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav>
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
        <a href="{{ '/research' | relative_url }}" {% if page.url contains 'research' %}class="active"{% endif %}>Research</a>
        <a href="{{ '/writing' | relative_url }}" {% if page.url contains 'writing' %}class="active"{% endif %}>Writing</a>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

    <footer>
      <p>Joel &mdash; Toulouse / Graz</p>
      <div class="footer-links">
        <a href="mailto:your@email.com">Email</a>
        <a href="https://github.com/yourusername" target="_blank" rel="noopener">GitHub</a>
        <a href="https://scholar.google.com" target="_blank" rel="noopener">Scholar</a>
      </div>
    </footer>
  </div>

</body>
</html>
