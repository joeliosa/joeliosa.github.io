---
layout: default
---

<main class="inner">
  <div class="post-header">
    {% if page.image %}
    <img src="{{ page.image }}" alt="{{ page.title }}" style="width:100%; margin-bottom:1.75rem; display:block;">
    {% endif %}
    <h1>{{ page.title }}</h1>
    <span class="post-date">{{ page.date | date: "%B %-d, %Y" }}</span>
  </div>
  <div class="post-content">
    {{ content }}
  </div>
</main>
